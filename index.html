<!DOCTYPE html>
<html>
<head>
    <title>Spotify RapidAPI App</title>
    <style>
        body {
            font-family: Arial;
            background-color: #1DB954;
            text-align: center;
            padding-top: 80px;
        }

        .box {
            background: white;
            width: 350px;
            margin: auto;
            padding: 25px;
            border-radius: 10px;
        }

        input {
            width: 90%;
            padding: 10px;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        img {
            width: 180px;
            margin-top: 15px;
            border-radius: 10px;
        }

        a {
            display: block;
            margin-top: 15px;
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Spotify Song Search</h2>

    <input type="text" id="link" placeholder="Paste Spotify song link">
    <br>
    <button onclick="searchSong()">Search</button>

    <div id="result"></div>
</div>

<script>
    async function searchSong() {
        let link = document.getElementById("link").value;
        let result = document.getElementById("result");

        result.innerHTML = "Loading...";

        let response = await fetch("/song?link=" + encodeURIComponent(link));
        let data = await response.json();

        if (data.error) {
            result.innerHTML = "<p>" + data.error + "</p>";
            return;
        }

        result.innerHTML = `
            <img src="${data.image}">
            <h3>${data.name}</h3>
            <p>${data.artist}</p>

            ${
                data.preview
                ? `<audio controls src="${data.preview}"></audio>`
                : `<p>No preview available</p>`
            }

            <a href="${data.spotify}" target="_blank">Open on Spotify</a>
        `;
    }
</script>

</body>
</html>
